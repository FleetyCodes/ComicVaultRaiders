<div id="login-dialog">
  <h1 id="title">You've been inactive for too long, please login</h1>
  <div mat-dialog-content>
    <form #loginForm="ngForm" (ngSubmit)="loginClick(loginForm)" novalidate>
        <div id="formfields-container"> 
            <mat-form-field class="inputfield" appearance="fill">
        <mat-label>Username</mat-label>
        <input
          matInput
          name="username"
          ngModel
          required
          #usernameCtrl="ngModel"
        />
        <mat-error *ngIf="usernameCtrl.invalid && usernameCtrl.touched">
          Username is required
        </mat-error>
      </mat-form-field>

      <mat-form-field class="inputfield" appearance="fill">
        <mat-label>Password</mat-label>
        <input
          matInput
          type="password"
          name="password"
          ngModel
          required
          minlength="8"
          #passCtrl="ngModel"
        />
        <mat-error *ngIf="passCtrl.invalid && passCtrl.touched">
          <span *ngIf="passCtrl.errors?.['required']"
            >Password is required</span
          >
          <span *ngIf="passCtrl.errors?.['minlength']"
            >Password must be at least 8 characters</span
          >
        </mat-error>
      </mat-form-field></div>
      

      <div mat-dialog-actions id="btn-div">
        <button
          id="ok-btn"
          mat-raised-button
          color="primary"
          type="submit"
          [disabled]="loginForm.invalid"
        >
          Login
        </button>
        <button mat-button id="cancel-btn" (click)="cancelClick()">
          Main Page
        </button>
      </div>
    </form>
  </div>
</div>
