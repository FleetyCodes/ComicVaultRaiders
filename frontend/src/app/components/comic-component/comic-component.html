<div class="comic-card">
    <div class="title-container">
        <h3>{{ comic.title }}</h3>
    </div>
    
    <div class="img-container">
        <img [src]="comic.coverImgUrl" alt="{{ comic.title }}" />
    </div>
    
    <button mat-icon-button color="primary" (click)="addComic()" *ngIf="!comicAdded()">
        <mat-icon>add</mat-icon>
    </button>
    <h1 style="color: red;" *ngIf="comicAdded()">Added</h1>
    <!--<p>Your Art Rate: {{ comic.artRate }}</p>-->
    <!--<p>Your Story Rate: {{ comic.storyRate }}</p>-->
</div>
