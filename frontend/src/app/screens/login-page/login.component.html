<main class="main">
  <div class="content">
    <div class="panel-header" *ngIf="!isLoading()">
      <button mat-icon-button id="back-button" (click)="goBack()">
        <mat-icon>arrow_back</mat-icon>
      </button>
      <h2>Login</h2>
    </div>

    <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)" novalidate *ngIf="!isLoading()">
      <mat-form-field appearance="fill">
        <mat-label>Username</mat-label>
        <input
          matInput
          name="username"
          ngModel
          required
          #usernameCtrl="ngModel"
        />
        <mat-error *ngIf="usernameCtrl.invalid && usernameCtrl.touched">
          Username is required
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="fill">
        <mat-label>Password</mat-label>
        <input
          matInput
          type="password"
          name="password"
          ngModel
          required
          minlength="8"
          #passCtrl="ngModel"
        />
        <mat-error *ngIf="passCtrl.invalid && passCtrl.touched">
          <span *ngIf="passCtrl.errors?.['required']">Password is required</span>
          <span *ngIf="passCtrl.errors?.['minlength']"
            >Password must be at least 8 characters</span
          >
        </mat-error>
      </mat-form-field>

      <button id="login-button"
        mat-raised-button
        color="primary"
        type="submit"
         [disabled]="loginForm.invalid"
      >
        Login
      </button>
    </form>
    <div id="spinner-div"><mat-spinner *ngIf="isLoading()"></mat-spinner></div>    
  </div>
</main>
